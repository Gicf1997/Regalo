<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>El Universo que construímos</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cinzel+Decorative:wght@400;700&family=Dancing+Script:wght@500;700&family=EB+Garamond:ital,wght@0,400;1,400&family=Quicksand:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:100%; height:100%; overflow:hidden; background:#020008; color:#fff; font-family:'Quicksand',sans-serif; }

/* ══════════════════════════════════════════════
   GLASSMORPHISM 
══════════════════════════════════════════════ */
.glass {
  background: rgba(12, 10, 28, 0.45);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(200, 180, 255, 0.15);
  border-top: 1px solid rgba(200, 180, 255, 0.3);
  box-shadow: 0 15px 35px rgba(0,0,0,0.5), inset 0 0 15px rgba(200,180,255,0.05);
}

/* ══════════════════════════════════════════════
   INTRO CINEMÁTICA
══════════════════════════════════════════════ */
#intro {
  position:fixed; inset:0; z-index:200;
  background:#020008;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  cursor:pointer;
}
#tw-wrap { text-align:center; padding:0 40px; max-width:800px; }

.tw-line {
  font-family:'EB Garamond',serif; font-style:italic;
  font-size:clamp(1.2rem,3vw,2rem);
  color:transparent;
  line-height:2; min-height:2em;
  letter-spacing:.03em;
}
.tw-line.fr { color:rgba(255,255,255,.0); }
.tw-line.name {
  font-family:'Cinzel Decorative',serif; font-style:normal;
  font-size:clamp(1.2rem,3vw,2rem);
  color:transparent; margin-top:20px;
  letter-spacing:.08em; text-shadow:0 0 20px rgba(205,160,60,.4);
}
#intro-hint {
  position:absolute; bottom:35px; left:50%; transform:translateX(-50%);
  font-family:'Cinzel',serif; font-size:.7rem; letter-spacing: .2em;
  color:rgba(255,255,255,.25); text-transform:uppercase; white-space:nowrap;
  animation:ph 3s ease-in-out infinite;
}
@keyframes ph { 0%,100%{opacity:.2} 50%{opacity:.6} }

/* ══════════════════════════════════════════════
   HUB PRINCIPAL
══════════════════════════════════════════════ */
#hub { position:fixed; inset:0; opacity:0; transition:opacity 1.8s ease; pointer-events:none; }
#hub.visible { opacity:1; pointer-events:auto; }

#bg-canvas  { position:absolute; top:0; left:0; z-index:1; pointer-events:none; }
#warp-canvas{ position:absolute; top:0; left:0; z-index:60; pointer-events:none; opacity:0; }

/* Constelaciones SVG */
#constellation-svg {
  position:absolute; inset:0; width:100%; height:100%;
  z-index:2; pointer-events:none; overflow:visible;
}

/* UI superior */
#ui-top {
  position:absolute; top:0; left:0; right:0; z-index:10;
  text-align:center; padding-top:5vh; pointer-events:none;
}
#main-title {
  font-family:'Cinzel Decorative',serif;
  font-size:clamp(1.5rem,4vw,3.2rem);
  color:#fff;
  text-shadow:0 0 30px rgba(160,120,255,.6),0 0 60px rgba(80,50,180,.4);
  letter-spacing:.05em;
}
#main-subtitle {
  font-family:'Dancing Script',cursive;
  font-size:clamp(1.1rem,2.2vw,1.5rem);
  color:rgba(220,195,252,.75); margin-top:5px;
  transition:color 2s ease, text-shadow 2s ease;
}

/* Galaxia */
#galaxy { position:absolute; inset:0; z-index:5; }

/* ── PLANETA BASE ─────────────────────────────────── */
.pc {
  position:absolute;
  display:flex; flex-direction:column; align-items:center;
  cursor:pointer;
  transform:translate(-50%,-50%);
  transition:transform .5s cubic-bezier(.175,.885,.32,1.275);
  user-select:none;
}
.pc:not(.locked):hover { transform:translate(-50%,-50%) scale(1.15); }
.pc:not(.locked):hover .p-ring { opacity:.6; transform:scale(1.1); }

/* Anillo orbital */
.p-ring {
  position:absolute; border-radius:50%;
  border:1px solid currentColor;
  opacity:.15; pointer-events:none;
  transition:opacity .5s, transform .5s;
  animation:ringFloat 6s ease-in-out infinite;
}
@keyframes ringFloat { 0%,100%{opacity:.15} 50%{opacity:.3} }

/* Esfera */
.p-sphere {
  border-radius:50%; position:relative; z-index:1;
  animation:planetFloat 6s ease-in-out infinite;
  transition:box-shadow .5s ease, filter .5s ease;
}
@keyframes planetFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }

/* Label con Glassmorphism */
.p-label {
  margin-top:20px;
  padding:6px 16px; border-radius:20px;
  font-family:'Cinzel',serif; font-size:.65rem;
  letter-spacing:.18em; text-transform:uppercase; font-weight:600;
  color:rgba(255,255,255,.5); transition:all .4s ease;
}
.pc:not(.locked):hover .p-label { 
  color:#fff; border-color:rgba(200,180,255,.5); background:rgba(255,255,255,.1);
  box-shadow:0 0 20px rgba(200,180,255,.3); text-shadow: 0 0 8px rgba(255,255,255,.8);
}

/* Visitado */
.pc.visited .p-sphere { filter:saturate(.6) brightness(.8); }
.pc.visited .p-label::after { content:' ✦'; color:rgba(185,255,210,.8); }

/* Bloqueado */
.pc.locked { cursor:not-allowed; opacity:.4; filter:grayscale(1); }
.pc.locked .p-label::after { content:' 🔒'; font-size: 0.6rem; opacity: 0.5; }

/* ── PLANETAS ESPECÍFICOS (Posiciones Desktop) ── */
#pc-chess { left:18%; top:28%; }
#pc-chess .p-sphere { width:70px; height:70px; background:radial-gradient(circle at 36% 34%, #c4b5fd, #6d28d9 58%, #1e0a44); box-shadow:inset -8px -8px 18px rgba(0,0,0,.6), 0 0 25px rgba(109,40,217,.5); animation-delay:0s; }
#pc-chess .p-ring { width:104px; height:104px; color:#a78bfa; }

#pc-math { left:26%; top:72%; }
#pc-math .p-sphere { width:56px; height:56px; background:radial-gradient(circle at 36% 34%, #a5f3fc, #0891b2 58%, #012a36); box-shadow:inset -7px -7px 16px rgba(0,0,0,.6), 0 0 22px rgba(8,145,178,.5); animation-delay:1.4s; }
#pc-math .p-ring { width:84px; height:84px; color:#67e8f9; }

#pc-magic { left:74%; top:26%; }
#pc-magic .p-sphere { width:64px; height:64px; background:radial-gradient(circle at 36% 34%, #fef9c3, #d97706 58%, #3a1800); box-shadow:inset -8px -8px 18px rgba(0,0,0,.6), 0 0 25px rgba(217,119,6,.5); animation-delay:2.1s; }
#pc-magic .p-ring { width:95px; height:95px; color:#fde047; }

#pc-music { left:77%; top:68%; }
#pc-music .p-sphere { width:58px; height:58px; background:radial-gradient(circle at 36% 34%, #fecdd3, #be123c 58%, #3b0012); box-shadow:inset -7px -7px 16px rgba(0,0,0,.6), 0 0 20px rgba(190,18,60,.4); animation-delay:3s; }
#pc-music .p-ring { width:86px; height:86px; color:#fca5a5; }

#pc-final { left:50%; top:50%; }
#pc-final .p-sphere { width:90px; height:90px; background:radial-gradient(circle at 36% 34%, #fce7f3, #9d174d 58%, #1f0012); box-shadow:inset -10px -10px 22px rgba(0,0,0,.6), 0 0 30px rgba(157,23,77,.4); animation-delay:1s; }
#pc-final .p-ring { width:128px; height:128px; color:#f9a8d4; }

/* Desbloqueo Final */
#pc-final.unlocked { opacity:1; filter:none; cursor:pointer; }
#pc-final.unlocked .p-sphere { animation:planetFloat 3s ease-in-out infinite, finalGlow 2s alternate infinite; }
#pc-final.unlocked .p-ring { animation:ringFloat 2s ease-in-out infinite; }
#pc-final.unlocked .p-label { color:rgba(249,168,212,.9); letter-spacing:.22em; border-color:rgba(249,168,212,.4); box-shadow:0 0 15px rgba(249,168,212,.2); }
#pc-final.unlocked .p-label::after { content: ''; } /* Quitar candado al desbloquear */

@keyframes finalGlow {
  from { box-shadow:inset -10px -10px 22px rgba(0,0,0,.5), 0 0 40px rgba(236,72,153,.6); }
  to   { box-shadow:inset -10px -10px 22px rgba(0,0,0,.3), 0 0 90px rgba(236,72,153,1), 0 0 150px rgba(180,30,100,.5); }
}

/* ── BARRA DE FRASE (Glassmorphism) ─────────────────────────────── */
#phrase-wrap {
  position:absolute; bottom:30px; left:50%; transform:translateX(-50%);
  z-index:10; text-align:center; pointer-events:none;
  width:92%; max-width:700px;
  padding:14px 20px; border-radius:8px;
  transition: all 1s ease; opacity: 0; visibility: hidden;
}
#phrase-wrap.has-content { opacity: 1; visibility: visible; }

#phrase-text {
  font-family:'Dancing Script',cursive; font-size:clamp(1.1rem,2.2vw,1.4rem);
  color:rgba(230,210,255,.8); letter-spacing:.03em; line-height:1.6;
  transition:color 1.5s ease, text-shadow 1.5s ease;
}
#phrase-text.complete {
  color:rgba(255,230,170,1); text-shadow:0 0 25px rgba(255,200,80,.6);
}

/* ── MODAL (Glassmorphism Profesional) ──────────────────────────── */
#hub-modal {
  position:fixed; top:50%; left:50%; transform:translate(-50%,-50%) scale(.9);
  border-radius:12px; padding:35px 45px; text-align:center; z-index:80;
  opacity:0; visibility:hidden; transition:all .4s cubic-bezier(.175,.885,.32,1.275);
  min-width:min(320px,88vw); max-width:450px;
}
#hub-modal.show { opacity:1; visibility:visible; transform:translate(-50%,-50%) scale(1); pointer-events:auto; }

#modal-icon { font-family:'Cinzel',serif; font-size:1.8rem; color:rgba(205,160,60,.8); display:block; margin-bottom:15px; text-shadow: 0 0 15px rgba(205,160,60,.4); }
#modal-icon::before, #modal-icon::after { content:' — '; opacity:.3; }

#modal-msg {
  font-family:'EB Garamond',serif; font-style:italic;
  font-size:1.25rem; color:#e2d8f0; line-height:1.7; margin-bottom:28px;
}
.modal-btn {
  background:rgba(255,255,255,.05); border:1px solid rgba(200,180,255,.3);
  color:rgba(200,180,255,.8); padding:10px 28px; border-radius:4px;
  font-family:'Cinzel',serif; font-size:.75rem; letter-spacing:.15em; text-transform:uppercase;
  cursor:pointer; transition:all .3s;
}
.modal-btn:hover { background:rgba(200,180,255,.15); color:#fff; box-shadow: 0 0 15px rgba(200,180,255,.3); border-color:rgba(200,180,255,.6); }

/* ══════════════════════════════════════════════
   MEDIA QUERIES (Móviles / Tablets)
══════════════════════════════════════════════ */
@media (max-width: 768px) {
  /* Reorganizamos la posición para que no colisionen en vertical */
  #pc-chess { left: 25%; top: 22%; }
  #pc-math { left: 75%; top: 35%; }
  #pc-magic { left: 25%; top: 52%; }
  #pc-music { left: 75%; top: 68%; }
  #pc-final { left: 50%; top: 85%; }
  
  /* Reducimos un poco los tamaños base de las esferas */
  .p-sphere { transform: scale(0.85); }
  .p-ring { transform: scale(0.85); }
  @keyframes planetFloat { 0%,100%{transform:scale(0.85) translateY(0)} 50%{transform:scale(0.85) translateY(-8px)} }

  /* Ajuste de UI superior para evitar solapamiento */
  #ui-top { padding-top: 8vh; }
  #phrase-wrap { bottom: 15px; padding: 10px 15px; }
}

@media (max-height: 600px) {
  /* Dispositivos en modo horizontal u horizontales muy pequeños */
  #pc-chess { left: 15%; top: 35%; }
  #pc-math { left: 35%; top: 65%; }
  #pc-final { left: 50%; top: 40%; }
  #pc-magic { left: 65%; top: 65%; }
  #pc-music { left: 85%; top: 35%; }
}
</style>
</head>
<body>

<div id="intro">
  <div id="tw-wrap">
    <div class="tw-line fr" id="tw1"></div>
    <div class="tw-line fr" id="tw2"></div>
    <div class="tw-line name" id="tw3"></div>
  </div>
  <div id="intro-hint">toca para continuar</div>
</div>

<div id="hub">
  <canvas id="bg-canvas"></canvas>
  <canvas id="warp-canvas"></canvas>

  <svg id="constellation-svg"></svg>

  <div id="ui-top">
    <div id="main-title">El Universo que Construímos</div>
    <div id="main-subtitle">Todo lo que aprendí de ti, hecho luz.</div>
  </div>

  <div id="galaxy">
    <div class="pc" id="pc-chess" onclick="intentarViaje('ajedrez.html','ajedrez', null, '')">
      <div class="p-ring"></div><div class="p-sphere"></div><div class="p-label glass">Estrategia</div>
    </div>
    <div class="pc locked" id="pc-math" onclick="intentarViaje('matematicas.html','matematicas', 'ajedrez', 'Estrategia')">
      <div class="p-ring"></div><div class="p-sphere"></div><div class="p-label glass">Mente</div>
    </div>
    <div class="pc locked" id="pc-magic" onclick="intentarViaje('hogwarts.html','hogwarts', 'matematicas', 'Mente')">
      <div class="p-ring"></div><div class="p-sphere"></div><div class="p-label glass">Magia</div>
    </div>
    <div class="pc locked" id="pc-music" onclick="intentarViaje('melodia.html','melodia', 'hogwarts', 'Magia')">
      <div class="p-ring"></div><div class="p-sphere"></div><div class="p-label glass">Melodía</div>
    </div>
    <div class="pc locked" id="pc-final" onclick="intentarViaje('lugarcitouu.html','final', 'melodia', 'Melodía')">
      <div class="p-ring"></div><div class="p-sphere"></div><div class="p-label glass">Lugarcitouuu</div>
    </div>
  </div>

  <div id="phrase-wrap" class="glass"><div id="phrase-text"></div></div>
</div>

<div id="hub-modal" class="glass">
  <span id="modal-icon">✦</span>
  <div id="modal-msg"></div>
  <button class="modal-btn" onclick="cerrarModal()">Entendido</button>
</div>

<script>
// ════════════════════════════════════════════
// CONFIGURACIÓN 
// ════════════════════════════════════════════
const NOMBRE = 'Lana';

// Frase dividida en los 3 primeros planetas
const PHRASE = {
  ajedrez:    'Si le monde est contre toi,',
  matematicas:'toi et moi',
  hogwarts:   'contre le monde.',
};

// ════════════════════════════════════════════
// PROGRESO Y SISTEMA SECUENCIAL
// ════════════════════════════════════════════
const V = {
  ajedrez:     localStorage.getItem('visited_ajedrez')     === 'true',
  matematicas: localStorage.getItem('visited_matematicas') === 'true',
  hogwarts:    localStorage.getItem('visited_hogwarts')    === 'true',
  melodia:     localStorage.getItem('visited_melodia')     === 'true'
};

const todosVisitados = V.ajedrez && V.matematicas && V.hogwarts && V.melodia;

// ════════════════════════════════════════════
// INTRO CINEMÁTICA
// ════════════════════════════════════════════
let introRunning = true;
let introClosed  = false; 

function delay(ms) {
  return new Promise(res => {
    const id = setTimeout(res, ms);
    const check = setInterval(() => { if(!introRunning){ clearTimeout(id); clearInterval(check); res(); }}, 50);
    setTimeout(() => clearInterval(check), ms + 100);
  });
}

function tw(el, text, speed) {
  return new Promise(res => {
    el.style.color = 'rgba(255,255,255,.9)';
    let i = 0;
    const tick = () => {
      if(!introRunning) { el.textContent = text; setTimeout(res, 0); return; }
      el.textContent = text.slice(0, ++i);
      i < text.length ? setTimeout(tick, speed) : setTimeout(res, 400);
    };
    setTimeout(tick, 0);
  });
}

async function runIntro() {
  const t1=document.getElementById('tw1');
  const t2=document.getElementById('tw2');
  const t3=document.getElementById('tw3');

  await tw(t1, 'Cada planeta guarda un fragmento de la verdad...', 65);
  await delay(1200);
  await tw(t2, 'Reúne la luz en orden para revelar el mensaje final.', 65);
  await delay(1200);
  t3.style.color = 'rgba(205,160,60,.9)';
  await tw(t3, `Feliz Cumpleaños, ${NOMBRE}.`, 85);
  await delay(2200);
  cerrarIntro();
}

function cerrarIntro() {
  if(introClosed) return; 
  introClosed = true;
  introRunning = false;
  const intro = document.getElementById('intro');
  intro.style.transition = 'opacity 1.5s ease';
  intro.style.opacity = '0';
  intro.style.pointerEvents = 'none';
  setTimeout(() => {
    intro.style.display = 'none';
    document.getElementById('hub').classList.add('visible');
    initHub();
  }, 1500);
}

document.getElementById('intro').addEventListener('click', cerrarIntro);
runIntro();

// ════════════════════════════════════════════
// HUB INIT - DESBLOQUEO SECUENCIAL
// ════════════════════════════════════════════
function initHub() {
  // 1. Estrategia siempre disponible
  if(V.ajedrez) document.getElementById('pc-chess').classList.add('visited');

  // 2. Mente (Requiere Estrategia)
  const pcMath = document.getElementById('pc-math');
  if(V.ajedrez) {
    pcMath.classList.remove('locked');
    if(V.matematicas) pcMath.classList.add('visited');
  }

  // 3. Magia (Requiere Mente)
  const pcMagic = document.getElementById('pc-magic');
  if(V.matematicas) {
    pcMagic.classList.remove('locked');
    if(V.hogwarts) pcMagic.classList.add('visited');
  }

  // 4. Melodía (Requiere Magia)
  const pcMusic = document.getElementById('pc-music');
  if(V.hogwarts) {
    pcMusic.classList.remove('locked');
    if(V.melodia) pcMusic.classList.add('visited');
  }

  // 5. Final (Requiere Melodía / Todos)
  const pcFinal = document.getElementById('pc-final');
  if(todosVisitados) {
    pcFinal.classList.remove('locked');
    pcFinal.classList.add('unlocked');
    document.getElementById('main-subtitle').textContent = '✨ Tu destino final está esperándote ✨';
    document.getElementById('main-subtitle').style.color = 'rgba(249,168,212,.9)';
    setTimeout(() => { unlockBurst = true; setTimeout(() => unlockBurst=false, 3500); }, 800);
  }

  actualizarFrase();
  setTimeout(dibujarConstelaciones, 150);

  const last = localStorage.getItem('last_visited');
  if(last) {
    const map = { ajedrez:'pc-chess', matematicas:'pc-math', hogwarts:'pc-magic', melodia:'pc-music', final:'pc-final' };
    const el = document.getElementById(map[last]);
    if(el) {
      el.style.transform = 'translate(-50%,-50%) scale(1.35)';
      el.style.transition = 'transform .6s cubic-bezier(.175,.885,.32,1.275)';
      setTimeout(() => { el.style.transform = ''; }, 800);
    }
    localStorage.removeItem('last_visited');
  }
}

function actualizarFrase() {
  const parts = [];
  // Solo se agrega a la frase si se ha visitado el planeta
  if(V.ajedrez)     parts.push(PHRASE.ajedrez);
  if(V.matematicas) parts.push(PHRASE.matematicas);
  if(V.hogwarts)    parts.push(PHRASE.hogwarts);
  
  const wrap = document.getElementById('phrase-wrap');
  const el = document.getElementById('phrase-text');
  
  // Si no hay partes, se mantiene invisible
  if(parts.length === 0) { 
    wrap.classList.remove('has-content'); 
    return; 
  }
  
  wrap.classList.add('has-content');
  el.textContent = '"' + parts.join(' ') + '"';
  
  // Si completó los 3 primeros, la frase brilla
  if(V.ajedrez && V.matematicas && V.hogwarts) el.classList.add('complete');
}

// ════════════════════════════════════════════
// CONSTELACIONES SVG - RUTA SECUENCIAL
// ════════════════════════════════════════════
const EDGES = [
  // Dibuja el camino lógico: Ajedrez -> Math -> Magic -> Music -> Final
  ['chess','math',   () => V.ajedrez ],
  ['math','magic',   () => V.matematicas ],
  ['magic','music',  () => V.hogwarts ],
  ['music','final',  () => V.melodia ]
];

function dibujarConstelaciones() {
  const svg  = document.getElementById('constellation-svg');
  const W2   = window.innerWidth, H2 = window.innerHeight;
  svg.innerHTML = '';
  
  // Recalcular posiciones dinámicas según la pantalla
  const getPos = (id) => {
    const el = document.getElementById(id);
    const rect = el.getBoundingClientRect();
    return [ (rect.left + rect.width/2)/W2, (rect.top + rect.height/2)/H2 ];
  };

  const currentPos = {
    chess: getPos('pc-chess'), math: getPos('pc-math'),
    magic: getPos('pc-magic'), music: getPos('pc-music'), final: getPos('pc-final')
  };

  EDGES.forEach(([a, b, cond]) => {
    const pa = currentPos[a], pb = currentPos[b], lit = cond();
    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1', pa[0]*W2); line.setAttribute('y1', pa[1]*H2);
    line.setAttribute('x2', pb[0]*W2); line.setAttribute('y2', pb[1]*H2);
    line.setAttribute('stroke', lit ? 'rgba(180,210,255,.25)' : 'rgba(180,210,255,.05)');
    line.setAttribute('stroke-width','1'); line.setAttribute('stroke-dasharray','4 8');
    svg.appendChild(line);
  });

  Object.entries(currentPos).forEach(([key,[px,py]]) => {
    const visited2 = (key==='chess'&&V.ajedrez)||(key==='math'&&V.matematicas)||(key==='magic'&&V.hogwarts)||(key==='music'&&V.melodia)||(key==='final'&&todosVisitados);
    const c = document.createElementNS('http://www.w3.org/2000/svg','circle');
    c.setAttribute('cx', px*W2); c.setAttribute('cy', py*H2); c.setAttribute('r','2.5');
    c.setAttribute('fill', visited2 ? 'rgba(255,255,255,.35)' : 'rgba(255,255,255,.08)');
    c.setAttribute('filter', visited2 ? 'drop-shadow(0 0 4px rgba(255,255,255,0.6))' : 'none');
    svg.appendChild(c);
  });
}
window.addEventListener('resize', () => { resize(); setTimeout(dibujarConstelaciones, 50); });

// ════════════════════════════════════════════
// NAVEGACIÓN SECUENCIAL
// ════════════════════════════════════════════
let warping = false;

function intentarViaje(destino, key, reqKey, nombreReq) {
  if(warping) return;
  
  // Validar si el planeta anterior fue completado
  if (reqKey && !V[reqKey]) {
      mostrarModal('✦', `El universo se expande a su tiempo...<br><br>Primero debes encontrar la luz en <em>${nombreReq}</em>.`);
      return;
  }
  
  warping = true;
  localStorage.setItem('last_visited', key);
  startWarp(() => { window.location.href = destino; });
}

function mostrarModal(icono, msg) {
  document.getElementById('modal-icon').textContent = icono;
  document.getElementById('modal-msg').innerHTML = msg;
  document.getElementById('hub-modal').classList.add('show');
}
function cerrarModal() { document.getElementById('hub-modal').classList.remove('show'); }

// ════════════════════════════════════════════
// CANVAS — FONDO PARALLAX & NUEVOS ELEMENTOS
// ════════════════════════════════════════════
const bgC   = document.getElementById('bg-canvas'), bgCtx = bgC.getContext('2d');
const wpC   = document.getElementById('warp-canvas'), wpCtx = wpC.getContext('2d');
let W,H,t=0, mx=0,my=0, unlockBurst=false;

function resize() { W = bgC.width = wpC.width = window.innerWidth; H = bgC.height = wpC.height = window.innerHeight; }
resize();

const genLayer=(n,rMin,rMax)=>Array.from({length:n},()=>({x:Math.random(),y:Math.random(),r:rMin+Math.random()*(rMax-rMin),tw:Math.random()*Math.PI*2,spd:.008+Math.random()*.02}));
const LAYERS=[ {s:genLayer(120,.35,.85), px:.008}, {s:genLayer(70,.85,1.6), px:.020}, {s:genLayer(30,1.5,2.6), px:.038} ];
const NEBS = Array.from({length:6},()=>({x:Math.random(),y:Math.random(),r:150+Math.random()*250,c:['rgba(80,40,180,','rgba(40,60,180,','rgba(120,40,100,','rgba(30,80,120,'][Math.floor(Math.random()*4)],a:.03+Math.random()*.05}));
const MOTES=Array.from({length:25},()=>({x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight,r:.8+Math.random()*1.8,vx:(Math.random()-.5)*.15,vy:-.08-.15*Math.random(),tw:Math.random()*Math.PI*2,c:['rgba(180,160,255,','rgba(160,210,255,','rgba(255,180,220,'][Math.floor(Math.random()*3)]}));

const TEXTS = ['Bongiaaaaa','L\'Amour de ma vie', 'Hesukena 😱', 'Lana', 'Pam Pam Pam 🫦','Gustavo', 'And... Nothing else Matters', 'Amorcitouuuu 💜', 'La Piba Soñada 🥰', 'Un Domingo por la Mañana 🙊', 'Coleccionando Miradas 😍', 'Ojitos Bonitos 👀', 'Gatita Hello Kitty 😼', 'Tu novio Gangsta 👁️','Lo más bonito de este mundo','Eso Eres', 'Ismael','Alaia ❤️', 'Wawawawawa 🥹'];
const WORDS = TEXTS.map(t => ({ s: t, x: Math.random(), y: Math.random(), vy: -0.0002 - Math.random() * 0.0004, sz: 14 + Math.random() * 20, a: 0, tw: Math.random() * Math.PI * 2, c: ['rgba(200,180,255,', 'rgba(255,230,170,', 'rgba(180,210,255,'][Math.floor(Math.random() * 3)] }));

const BURST_POS = [.50,.50];
let burstPP=[]; 
window.addEventListener('mousemove',e=>{mx=(e.clientX/W-.5);my=(e.clientY/H-.5);});

function renderBg() {
  t+=.012;
  bgCtx.clearRect(0,0,W,H);
  const bg=bgCtx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#020008'); bg.addColorStop(.55,'#030010'); bg.addColorStop(1,'#060015');
  bgCtx.fillStyle=bg; bgCtx.fillRect(0,0,W,H);

  NEBS.forEach(n=>{
    const g=bgCtx.createRadialGradient(n.x*W,n.y*H,0,n.x*W,n.y*H,n.r);
    g.addColorStop(0,n.c+n.a+')'); g.addColorStop(1,n.c+'0)');
    bgCtx.fillStyle=g; bgCtx.beginPath(); bgCtx.arc(n.x*W,n.y*H,n.r,0,Math.PI*2); bgCtx.fill();
  });

  LAYERS.forEach(layer=>{
    layer.s.forEach(s=>{
      s.tw+=s.spd; const a=.15+.4*Math.abs(Math.sin(s.tw)), ox=mx*layer.px*W, oy=my*layer.px*H;
      bgCtx.globalAlpha=a; bgCtx.fillStyle='#fff';
      bgCtx.beginPath(); bgCtx.arc(s.x*W+ox, s.y*H+oy, s.r, 0, Math.PI*2); bgCtx.fill();
    });
  });

  WORDS.forEach(w => {
    w.y += w.vy;
    if (w.y < -0.05) w.y = 1.05;
    w.tw += 0.005;
    const alpha = Math.max(0, Math.sin(w.tw)) * 0.4;
    bgCtx.globalAlpha = alpha; bgCtx.fillStyle = w.c + alpha + ')';
    bgCtx.font = `${w.sz}px 'Dancing Script', cursive`; bgCtx.textAlign = 'center';
    bgCtx.fillText(w.s, w.x * W, w.y * H);
  });

  MOTES.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy;
    if(p.y<-10){p.y=H+10;p.x=Math.random()*W;}
    if(p.x<0)p.x=W; if(p.x>W)p.x=0;
    p.tw+=.018; bgCtx.globalAlpha=.1+Math.abs(Math.sin(p.tw))*.15;
    bgCtx.fillStyle=p.c+(.6+Math.abs(Math.sin(p.tw))*.4)+')';
    bgCtx.beginPath(); bgCtx.arc(p.x,p.y,p.r,0,Math.PI*2); bgCtx.fill();
  });

  const snX = (W/2) + Math.cos(t * 0.45) * W * 0.38; 
  const snY = (H/2) + Math.sin(t * 0.75) * H * 0.30;
  const snWa = Math.sin(t * 12) * 0.7; 
  
  bgCtx.globalAlpha = 0.85; bgCtx.save(); bgCtx.translate(snX, snY);
  [-1, 1].forEach(s => {
    bgCtx.save(); bgCtx.rotate(snWa * s); bgCtx.fillStyle = 'rgba(255,230,128,0.55)';
    bgCtx.beginPath(); bgCtx.ellipse(s * 13, 0, 13, 5, s * 0.2, 0, Math.PI*2);
    bgCtx.fill(); bgCtx.restore();
  });
  
  const sg = bgCtx.createRadialGradient(-2,-2,0,0,0,6);
  sg.addColorStop(0,'#FFF0A0'); sg.addColorStop(1,'#DAA520');
  bgCtx.fillStyle = sg; bgCtx.beginPath(); bgCtx.arc(0,0,6,0,Math.PI*2); bgCtx.fill();
  
  const gg = bgCtx.createRadialGradient(0,0,0,0,0,25);
  gg.addColorStop(0,'rgba(255,220,50,0.3)'); gg.addColorStop(1,'rgba(255,220,50,0)');
  bgCtx.fillStyle = gg; bgCtx.beginPath(); bgCtx.arc(0,0,25,0,Math.PI*2); bgCtx.fill(); bgCtx.restore();
  
  if(Math.random() < 0.45) {
    burstPP.push({ x: snX, y: snY, vx: (Math.random()-0.5)*1.5, vy: (Math.random()-0.5)*1.5, a: 0.8, da: 0.02, r: 1.5+Math.random()*2, c: 'rgba(255,230,128,' });
  }

  if(unlockBurst && Math.random()<.2) {
    const px=BURST_POS[0]*W, py=BURST_POS[1]*H;
    const cols=['rgba(255,100,160,','rgba(249,168,212,','rgba(255,200,230,'];
    burstPP.push({ x:px, y:py, vx:(Math.random()-.5)*8, vy:(Math.random()-.5)*8, a:1, da:.02, r:2+Math.random()*6, c:cols[Math.floor(Math.random()*3)] });
  }

  burstPP=burstPP.filter(p=>p.a>0);
  burstPP.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vy+=.03; p.a-=p.da;
    bgCtx.globalAlpha=p.a; bgCtx.fillStyle=p.c+p.a+')';
    bgCtx.beginPath(); bgCtx.arc(p.x,p.y,p.r,0,Math.PI*2); bgCtx.fill();
  });

  bgCtx.globalAlpha=1;
  requestAnimationFrame(renderBg);
}
renderBg();

// ════════════════════════════════════════════
// EFECTO WARP
// ════════════════════════════════════════════
const WARP_S=Array.from({length:180},()=>({ ang:Math.random()*Math.PI*2, d:15+Math.random()*200, spd:8+Math.random()*20, c:['#ffffff','#b4d4ff','#ffd4f5','#c4f0e0'][Math.floor(Math.random()*4)], w:.6+Math.random()*2 }));
let warpProg=0, warpCB=null, warpActive=false;

function startWarp(cb) { warpActive=true; warpProg=0; warpCB=cb; wpC.style.opacity='1'; animWarp(); }
function animWarp() {
  if(!warpActive) return;
  warpProg+=.024; const cx=W/2, cy=H/2;
  wpCtx.clearRect(0,0,W,H); const dark=Math.min(1,warpProg*.95);
  wpCtx.fillStyle=`rgba(0,0,0,${dark*.9})`; wpCtx.fillRect(0,0,W,H);
  WARP_S.forEach(s=>{
    const ease=warpProg*warpProg, d=s.d+s.spd*ease*45, tail=s.spd*ease*32+3;
    const x1=cx+Math.cos(s.ang)*d, y1=cy+Math.sin(s.ang)*d, x2=cx+Math.cos(s.ang)*(d+tail), y2=cy+Math.sin(s.ang)*(d+tail);
    const gr=wpCtx.createLinearGradient(x1,y1,x2,y2); gr.addColorStop(0,'transparent'); gr.addColorStop(1,s.c);
    wpCtx.strokeStyle=gr; wpCtx.lineWidth=s.w; wpCtx.beginPath(); wpCtx.moveTo(x1,y1); wpCtx.lineTo(x2,y2); wpCtx.stroke();
  });
  if(warpProg<1.3) requestAnimationFrame(animWarp); else if(warpCB) warpCB();
}
</script>
